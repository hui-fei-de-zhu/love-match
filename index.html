<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心动配对</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #e8576b; --pink-dark: #d6304a; --pink-light: #ff8a9e;
  --bg: #fef0f3; --card: #fff; --text: #2d3436; --sub: #636e72;
  --shadow: 0 4px 24px rgba(232,87,107,0.12); --radius: 20px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #fef0f3 0%, #ffe4e8 50%, #fce4ec 100%);
  min-height: 100dvh; display: flex; justify-content: center; align-items: center;
  -webkit-tap-highlight-color: transparent; overflow-x: hidden;
}
.app { width: 100%; max-width: 420px; padding: 20px; position: relative; }
.card {
  background: var(--card); border-radius: var(--radius); padding: 28px 22px;
  box-shadow: var(--shadow); width: 100%;
}
.screen { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.4s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.logo {
  width: 80px; height: 80px; border-radius: 50%; font-size: 42px;
  background: linear-gradient(135deg, var(--pink), var(--pink-light));
  display: flex; align-items: center; justify-content: center;
  margin: 24px 0 16px; box-shadow: 0 8px 32px rgba(232,87,107,0.35);
  animation: beat 1.4s ease-in-out infinite;
}
@keyframes beat {
  0%,100%{transform:scale(1)} 15%{transform:scale(1.15)} 30%{transform:scale(1)} 45%{transform:scale(1.1)} 60%{transform:scale(1)}
}
.title { font-size: 28px; font-weight: 800; color: var(--text); } .title span { color: var(--pink); }
.subtitle { font-size: 14px; color: var(--sub); text-align: center; line-height: 1.7; margin: 8px 0 32px; }

.btn {
  width: 100%; padding: 16px; border: none; border-radius: 50px; font-size: 17px;
  font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.96); } .btn:disabled { opacity: 0.6; pointer-events: none; }
.btn-pri { background: linear-gradient(135deg, var(--pink), var(--pink-light)); color: #fff; box-shadow: 0 6px 20px rgba(232,87,107,0.35); }
.btn-out { background: #fff; color: var(--pink); border: 2px solid var(--pink); }
.btn-ghost { background: none; color: var(--sub); font-size: 14px; padding: 10px; }
.btn-small { width: auto; padding: 12px 24px; font-size: 15px; display: inline-flex; }
.btn-row { display: flex; gap: 12px; width: 100%; } .btn-row .btn { flex: 1; }

.form-group { margin-bottom: 16px; width: 100%; }
.form-label { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 14px 16px; border: 2px solid #eee; border-radius: 14px;
  font-size: 16px; font-family: inherit; background: #fafafa; color: var(--text);
  transition: all 0.2s; -webkit-appearance: none; outline: none;
}
.form-input:focus { border-color: var(--pink-light); background: #fff; box-shadow: 0 0 0 4px rgba(232,87,107,0.06); }
.form-input::placeholder { color: #b2bec3; }
.form-error { font-size: 12px; color: #d6304a; margin-top: 4px; display: none; }
.form-error.show { display: block; }

.result-icon { font-size: 72px; margin: 30px 0 12px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes popIn { 0%{transform:scale(0);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
.result-title { font-size: 24px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 8px; }
.result-desc { font-size: 14px; color: var(--sub); text-align: center; line-height: 1.8; }
.match-names { display: flex; align-items: center; gap: 14px; margin: 16px 0; font-size: 18px; font-weight: 700; color: var(--pink-dark); }
.match-names .heart { font-size: 28px; animation: beat 0.8s ease-in-out infinite; }

.share-box {
  background: #f8f9fa; border-radius: 14px; padding: 16px; text-align: center;
  margin-top: 16px; width: 100%;
}
.share-box .share-url { font-size: 12px; color: var(--sub); word-break: break-all; background: #fff; padding: 10px; border-radius: 10px; margin: 8px 0; border: 1px dashed #ddd; user-select: all; }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(45,52,54,0.9); color: #fff; padding: 12px 24px; border-radius: 50px;
  font-size: 14px; z-index: 999; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
  pointer-events: none; max-width: 90vw;
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-20px)} }

.confetti {
  position: fixed; z-index: 998; pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

.hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.hearts-bg span { position: absolute; animation: floatUp linear infinite; opacity: 0; font-size: 18px; }
@keyframes floatUp {
  0%{transform:translateY(105vh) rotate(0deg) scale(0.5);opacity:0}
  10%{opacity:0.4} 90%{opacity:0.2}
  100%{transform:translateY(-10vh) rotate(360deg) scale(1.2);opacity:0}
}

.privacy { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #b2bec3; margin-top: 12px; justify-content: center; }
.back-btn { background: none; border: none; font-size: 26px; color: var(--text); cursor: pointer; padding: 8px 12px; align-self: flex-start; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="app">
  <!-- ===== 首页 ===== -->
  <div class="screen active" id="homeScreen">
    <div class="logo">💝</div>
    <div class="title">心动<span>配对</span></div>
    <p class="subtitle">写下你的心意<br>如果 TA 也写下了你……</p>
    <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
      <button class="btn btn-pri" onclick="showScreen('register')">💌 我要登记</button>
      <button class="btn btn-out" onclick="showScreen('query')">🔍 查询配对状态</button>
    </div>
    <div class="privacy">🔒 数据仅通过链接分享，不会上传到任何服务器</div>
  </div>

  <!-- ===== 登记页 ===== -->
  <div class="screen" id="registerScreen">
    <button class="back-btn" onclick="showScreen('home')">‹</button>
    <div class="card">
      <h2 style="text-align:center;font-size:20px;color:var(--text);margin-bottom:20px;">💌 写下你的心意</h2>
      <div class="form-group">
        <label class="form-label">👤 你的名字</label>
        <input class="form-input" id="regMyName" maxlength="20" placeholder="请输入你的名字" autocomplete="off">
        <div class="form-error" id="errMyName"></div>
      </div>
      <div class="form-group">
        <label class="form-label">💕 你喜欢的人</label>
        <input class="form-input" id="regCrushName" maxlength="20" placeholder="请输入 TA 的名字" autocomplete="off">
        <div class="form-error" id="errCrushName"></div>
      </div>
      <button class="btn btn-pri" onclick="handleRegister()">✨ 确认登记</button>
      <div class="privacy">🔒 你的信息不会被上传，仅保存在分享链接中</div>
    </div>
  </div>

  <!-- ===== 登记结果页 ===== -->
  <div class="screen" id="resultScreen">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="match-names" id="matchNames" style="display:none;">
      <span id="matchName1"></span><span class="heart">❤️</span><span id="matchName2"></span>
    </div>
    <p class="result-desc" id="resultDesc"></p>
    <div class="share-box" id="shareBox" style="display:none;">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">📋 复制链接发给 TA</div>
      <div class="share-url" id="shareUrl" onclick="copyShareUrl()"></div>
      <p style="font-size:11px;color:#b2bec3;margin-top:4px;">TA 打开链接登记后，如果互相喜欢就会配对！</p>
    </div>
    <div style="width:100%;margin-top:20px;display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-pri" id="btnResultPri" onclick="handleResultAction()"></button>
      <button class="btn btn-out" onclick="showScreen('home')">🏠 返回首页</button>
    </div>
  </div>

  <!-- ===== 查询页 ===== -->
  <div class="screen" id="queryScreen">
    <button class="back-btn" onclick="showScreen('home')">‹</button>
    <div class="card">
      <h2 style="text-align:center;font-size:20px;color:var(--text);margin-bottom:20px;">🔍 查询配对状态</h2>
      <div class="form-group">
        <label class="form-label">👤 你的名字</label>
        <input class="form-input" id="queryMyName" maxlength="20" placeholder="请输入你的名字" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">💕 对方的名字</label>
        <input class="form-input" id="queryCrushName" maxlength="20" placeholder="请输入对方的名字" autocomplete="off">
      </div>
      <button class="btn btn-pri" onclick="handleQuery()">🔍 查询</button>
      <div style="margin-top:16px;padding:16px;border-radius:14px;text-align:center;font-size:14px;line-height:1.8;display:none;" id="queryResult"></div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

// 检测 file:// 协议
if (window.location.protocol === 'file:') {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;">' +
    '<div style="background:#fff;border-radius:20px;padding:28px 24px;text-align:center;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.1);">' +
    '<span style="font-size:48px;">⚠️</span>' +
    '<h3 style="margin:12px 0;color:#e74c3c;">请通过服务器访问</h3>' +
    '<p style="font-size:14px;color:#666;line-height:1.6;">不要直接双击HTML文件！<br>请双击 <strong>start.bat</strong> 启动服务器，<br>浏览器会自动打开正确的地址。</p>' +
    '<p style="font-size:12px;color:#999;margin-top:8px;">启动后地址: <strong>http://localhost:3457</strong></p>' +
    '</div></div>';
  throw new Error('Please use start.bat');
}

// ============ 编码 / 解码 ============
// URL参数格式: ?n=我的名字&c=喜欢的人的名字&t=时间戳
function makeShareUrl(myName, crushName) {
  var base = window.location.origin + window.location.pathname;
  return base + '?n=' + encodeURIComponent(myName) + '&c=' + encodeURIComponent(crushName) + '&t=' + Date.now();
}

function getUrlParams() {
  var p = new URLSearchParams(window.location.search);
  return {
    n: p.get('n') || '',
    c: p.get('c') || '',
    t: p.get('t') || ''
  };
}

function hasIncomingRegistration() {
  var p = getUrlParams();
  return !!(p.n && p.c);
}

// 检查配对（在当前URL参数中）
function checkMutualMatch(urlName, urlCrush, myName, myCrush) {
  return (myName === urlCrush && myCrush === urlName);
}

// ============ 页面切换 ============
function showScreen(name) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  var el = document.getElementById(name + 'Screen');
  if (el) el.classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function $(id) { return document.getElementById(id); }

function showToast(msg) {
  var old = document.querySelector('.toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2200);
}

// ============ 撒花 ============
function confetti() {
  var colors = ['#e8576b','#ff8a9e','#fdcb6e','#ff6b8a','#ffb8c6','#ffeaa7','#fd79a8','#00b894'];
  for (var i = 0; i < 60; i++) {
    (function(j){
      setTimeout(function(){
        var el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = -(Math.random() * 30) + 'px';
        el.style.width = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 14) + 'px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (2 + Math.random() * 3) + 's';
        el.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(el);
        setTimeout(function(){ el.remove(); }, 4000);
      }, j * 30);
    })(i);
  }
}

// ============ 登记逻辑 ============
function handleRegister() {
  var myName = $('regMyName').value.trim();
  var crushName = $('regCrushName').value.trim();
  var valid = true;

  clearFieldError('errMyName'); clearFieldError('errCrushName');

  if (!myName) { showFieldError('errMyName', '请输入你的名字'); valid = false; }
  if (!crushName) { showFieldError('errCrushName', '请输入对方的名字'); valid = false; }
  if (myName && crushName && myName === crushName) { showFieldError('errCrushName', '不能填写自己的名字'); valid = false; }
  if (!valid) return;

  var urlParams = getUrlParams();
  var isMatch = false;

  // 检查URL中是否有人已经登记了
  if (hasIncomingRegistration()) {
    // 有人通过分享链接来了
    if (checkMutualMatch(urlParams.n, urlParams.c, myName, crushName)) {
      // 配对成功！
      isMatch = true;
      showMatchResult(urlParams.n, urlParams.c);
      $('regMyName').value = ''; $('regCrushName').value = '';
      return;
    }
  }

  // 未配对，生成分享链接
  var shareUrl = makeShareUrl(myName, crushName);
  showWaitingResult(myName, crushName, shareUrl);

  $('regMyName').value = ''; $('regCrushName').value = '';
}

// ============ 结果显示 ============
function showMatchResult(name1, name2) {
  $('resultIcon').textContent = '🎉';
  $('resultIcon').style.color = '';
  $('resultTitle').textContent = '配对成功！';
  $('resultDesc').innerHTML = '你们互相喜欢！<br>这就是双向奔赴的浪漫 💕';
  $('matchName1').textContent = name1;
  $('matchName2').textContent = name2;
  $('matchNames').style.display = 'flex';
  $('shareBox').style.display = 'none';
  $('btnResultPri').innerHTML = '🎊 太棒了！';
  $('btnResultPri').onclick = function(){ confetti(); showToast('💕 恭喜！快去告诉 TA 吧！'); };
  showScreen('result');
  confetti();
  setTimeout(function(){ confetti(); }, 800);
  // 清除URL参数
  if (window.history.replaceState) {
    window.history.replaceState({}, '', window.location.pathname);
  }
}

function showWaitingResult(myName, crushName, shareUrl) {
  $('resultIcon').textContent = '💌';
  $('resultIcon').style.color = '';
  $('resultTitle').textContent = '已记录你的心意';
  $('resultDesc').innerHTML = '如果 <b>' + esc(crushName) + '</b> 也选择了你<br>你们就会配对成功！';
  $('matchNames').style.display = 'none';
  $('shareBox').style.display = 'block';
  $('shareUrl').textContent = shareUrl;
  $('btnResultPri').innerHTML = '📋 复制链接发给 TA';
  $('btnResultPri').onclick = function(){ copyText(shareUrl); };
  showScreen('result');
}

function copyShareUrl() {
  var url = $('shareUrl').textContent;
  copyText(url);
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){
      showToast('链接已复制！快去发给 TA 吧 💕');
    }).catch(function(){
      showToast('复制失败，请长按手动复制');
    });
  } else {
    showToast('请长按链接手动复制');
  }
}

function handleResultAction() {
  // 由 btnResultPri.onclick 动态决定
}

// ============ 查询逻辑 ============
function handleQuery() {
  var myName = $('queryMyName').value.trim();
  var crushName = $('queryCrushName').value.trim();
  var result = $('queryResult');

  if (!myName || !crushName) {
    result.style.display = 'block';
    result.style.background = '#f8f9fa'; result.style.color = '#636e72';
    result.innerHTML = '请填写完整的名字';
    return;
  }
  if (myName === crushName) {
    result.style.display = 'block';
    result.style.background = '#f8f9fa'; result.style.color = '#636e72';
    result.innerHTML = '不能查询自己和自己哦';
    return;
  }

  // 检查当前URL
  var urlParams = getUrlParams();
  var isMatched = (urlParams.n === crushName && urlParams.c === myName) || (urlParams.n === myName && urlParams.c === crushName);

  // 检查localStorage中的历史
  var history = getHistory();
  var foundInHistory = false;
  for (var i = 0; i < history.length; i++) {
    var h = history[i];
    if ((h.n === crushName && h.c === myName) || (h.n === myName && h.c === crushName)) {
      foundInHistory = true;
      break;
    }
  }

  result.style.display = 'block';

  if (isMatched) {
    result.style.background = '#e8f8f5'; result.style.color = '#006c4e';
    result.innerHTML = '🎉 <b>配对成功！</b><br><b>' + esc(myName) + '</b> ❤️ <b>' + esc(crushName) + '</b><br>你们互相喜欢！';
  } else if (foundInHistory) {
    result.style.background = '#fff9e6'; result.style.color = '#856404';
    result.innerHTML = '💭 有人已经登记了心意<br>但可能还没有互相配对<br>再等等看吧~';
  } else if (urlParams.n && urlParams.c) {
    result.style.background = '#fff9e6'; result.style.color = '#856404';
    result.innerHTML = '💭 <b>' + esc(urlParams.n) + '</b> 正在等待<br><b>' + esc(urlParams.c) + '</b> 的回应';
  } else {
    result.style.background = '#f8f9fa'; result.style.color = '#636e72';
    result.innerHTML = '📭 还没有找到相关记录<br>快去分享链接给你的 TA 吧！';
  }

  // 保存查询到历史
  addHistory(myName, crushName);
}

// ============ 本地历史（辅助） ============
function getHistory() {
  try { return JSON.parse(localStorage.getItem('lovematch_history') || '[]'); } catch(e) { return []; }
}
function addHistory(n, c) {
  var h = getHistory();
  // 去重
  for (var i = 0; i < h.length; i++) {
    if (h[i].n === n && h[i].c === c) return;
  }
  h.push({n: n, c: c, t: Date.now()});
  if (h.length > 50) h.shift();
  localStorage.setItem('lovematch_history', JSON.stringify(h));
}

// ============ 辅助 ============
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function clearFieldError(id) {
  var el = $(id); el.textContent = ''; el.classList.remove('show');
}
function showFieldError(id, msg) {
  var el = $(id); el.textContent = msg; el.classList.add('show');
}

// ============ 背景爱心 ============
function initHearts() {
  var container = document.getElementById('heartsBg');
  var emojis = ['💕','💗','💖','💝','💘','💓','♥','🩷'];
  for (var i = 0; i < 15; i++) {
    var span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.left = Math.random() * 100 + '%';
    span.style.fontSize = (Math.random() * 14 + 12) + 'px';
    span.style.animationDuration = (Math.random() * 8 + 10) + 's';
    span.style.animationDelay = (Math.random() * 8) + 's';
    container.appendChild(span);
  }
}

// ============ 初始化 ============
function init() {
  initHearts();

  // 如果URL带有参数，显示特殊欢迎
  if (hasIncomingRegistration()) {
    var p = getUrlParams();
    // 短暂显示提示，然后引导登记
    showToast('💌 ' + esc(p.n) + ' 向你发来了心动信号！');
  }

  // 事件绑定
  $('regCrushName').addEventListener('keydown', function(e){ if(e.key==='Enter') handleRegister(); });
  $('queryCrushName').addEventListener('keydown', function(e){ if(e.key==='Enter') handleQuery(); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
})();
</script>
</body>
</html>

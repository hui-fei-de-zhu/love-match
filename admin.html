<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 心动配对</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background: #f5f6fa;
  padding: 20px;
  color: #2d3436;
}
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 20px; color: #e8576b; }
h2 { font-size: 18px; margin-bottom: 12px; }
.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}
.stat-item {
  text-align: center;
  padding: 16px;
  background: #fef0f3;
  border-radius: 14px;
}
.stat-value { font-size: 32px; font-weight: 700; color: #e8576b; }
.stat-label { font-size: 13px; color: #636e72; margin-top: 4px; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
th,td {
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid #eee;
}
th { background: #fafafa; font-weight: 600; color: #636e72; font-size: 12px; text-transform: uppercase; }
tr:hover td { background: #fef0f3; }
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-matched { background: #e8f8f5; color: #006c4e; }
.badge-waiting { background: #fff9e6; color: #856404; }
.btn {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-danger { background: #d6304a; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-outline { background: none; border:1px solid #ddd; color: #636e72; }
.btn-outline:hover { background: #f5f5f5; }
.btn-small { padding: 4px 12px; font-size: 12px; }
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
input[type="text"],input[type="password"] {
  padding: 8px 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
}
input:focus { outline: none; border-color: #e8576b; }
.empty-state { text-align: center; padding: 40px; color: #b2bec3; }
.toast {
  position: fixed; top:20px; left:50%; transform:translateX(-50%);
  background: #2d3436; color:#fff; padding:12px 24px;
  border-radius: 50px; font-size:14px; z-index:1000;
  animation: toastIn .3s ease, toastOut .3s ease 1.8s forwards;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.loading { text-align:center; padding:40px; color:#b2bec3; }
.refresh-info { font-size:12px; color:#b2bec3; }
</style>
</head>
<body>
<div class="container">
  <h1>💝 心动配对 · 管理后台</h1>

  <div class="card">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item"><div class="stat-value">-</div><div class="stat-label">参与人数</div></div>
      <div class="stat-item"><div class="stat-value">-</div><div class="stat-label">配对成功</div></div>
      <div class="stat-item"><div class="stat-value">-</div><div class="stat-label">总记录数</div></div>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <h2 style="margin:0;flex:1;">配对记录</h2>
      <button class="btn btn-outline" onclick="loadData()">🔄 刷新</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑 清除全部</button>
    </div>
    <div id="tableContainer">
      <div class="loading">加载中...</div>
    </div>
    <div class="refresh-info" style="margin-top:12px;" id="refreshInfo"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const API_KEY = localStorage.getItem('admin_api_key') || 'love-match-2024';

async function api(path, options = {}) {
  const url = new URL(path, API_BASE);
  const method = options.method || 'GET';
  if (method === 'GET' && options.params) {
    Object.entries(options.params).forEach(([k,v]) => url.searchParams.set(k,v));
  }
  url.searchParams.set('apiKey', API_KEY);
  const fetchOpts = { method, headers: { 'Content-Type': 'application/json' } };
  if (method !== 'GET') fetchOpts.body = JSON.stringify({ ...options.body });
  const res = await fetch(url.toString(), fetchOpts);
  return res.json();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

async function loadData() {
  try {
    const [stats, recordsData] = await Promise.all([
      api('/api/stats'),
      api('/api/admin/records')
    ]);

    // Stats
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-item"><div class="stat-value">${stats.totalParticipants}</div><div class="stat-label">参与人数</div></div>
      <div class="stat-item"><div class="stat-value">${stats.matchedPairs}</div><div class="stat-label">配对成功</div></div>
      <div class="stat-item"><div class="stat-value">${stats.totalRecords}</div><div class="stat-label">总记录数</div></div>
    `;

    // Table
    const records = recordsData.records || [];
    if (records.length === 0) {
      document.getElementById('tableContainer').innerHTML = '<div class="empty-state">📭 暂无配对记录</div>';
    } else {
      const rows = records.sort((a,b) => b.timestamp - a.timestamp).map(r => `
        <tr>
          <td>${escapeHTML(r.myName)}</td>
          <td>${escapeHTML(r.crushName)}</td>
          <td><span class="badge ${r.matched ? 'badge-matched' : 'badge-waiting'}">${r.matched ? '已配对' : '等待中'}</span></td>
          <td>${formatTime(r.timestamp)}</td>
          <td>
            <button class="btn btn-outline btn-small" onclick="deleteRecord('${r.id}')">删除</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('tableContainer').innerHTML = `
        <table>
          <thead><tr><th>姓名</th><th>心仪对象</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    document.getElementById('refreshInfo').textContent = '最后更新: ' + formatTime(Date.now());
  } catch (e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-state">❌ 连接失败: ' + e.message + '</div>';
  }
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function deleteRecord(id) {
  if (!confirm('确定删除这条记录吗？如果已配对，对方的配对状态也会被解除。')) return;
  try {
    const res = await api('/api/admin/record/' + id, { method: 'DELETE' });
    if (res.success) {
      showToast('已删除');
      loadData();
    } else {
      showToast('删除失败: ' + res.error);
    }
  } catch (e) {
    showToast('删除失败: ' + e.message);
  }
}

async function clearAll() {
  if (!confirm('确定清除全部数据吗？此操作不可恢复！')) return;
  try {
    const res = await api('/api/admin/clear', { method: 'POST' });
    if (res.success) {
      showToast('全部数据已清除');
      loadData();
    } else {
      showToast('清除失败: ' + res.error);
    }
  } catch (e) {
    showToast('清除失败: ' + e.message);
  }
}

// Auto-refresh every 10 seconds
setInterval(loadData, 10000);
loadData();
</script>
</body>
</html>
